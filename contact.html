    <style>
        /* Page-Specific Form Styling to match iOS Inputs */
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-color);
            opacity: 0.8;
        }

        textarea { resize: vertical; }

        input, textarea {
            width: 100%;
            padding: 16px;
            border-radius: 16px; /* Super rounded iOS style */
            border: 1px solid rgba(0,0,0,0.1);
            background-color: rgba(255,255,255,0.6); /* Semi-transparent */
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        /* The "Active" State - Apple Blue Glow */
        input:focus, textarea:focus {
            outline: none;
            background-color: white;
            border-color: var(--ios-blue);
            box-shadow: 0 0 0 4px rgba(0,122,255,0.15);
            transform: scale(1.01);
        }

        /* Dark Mode overrides are handled by style.css !important rules */
    </style>
</head>

    <main>
        <div class="page-hero" style="text-align: center; padding: 40px 0 60px;">
            <h1>Get in Touch</h1>
            <p class="tagline">Have a question or want to work together?</p>
        </div>
    
        <div style="max-width: 600px; margin: 0 auto;">
            <form action="https://formspree.io/f/xvzbegow" method="POST" class="glass-card card-content">                
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John Appleseed" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="john@icloud.com" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Tell me about your project or opportunity..." required></textarea>
                </div>
                
                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer; font-size: 1rem; padding: 16px; margin-top: 10px;">
                    Send Message
                </button>
            </form>

        </div>

        <p style="text-align: center; color: var(--text-muted); margin-top: 30px; font-size: 0.9rem;">
            Prefer to connect directly? <a href="https://www.linkedin.com/in/kevin-struna/" target="_blank" rel="noopener noreferrer" style="color: var(--ios-blue); font-weight: 600;">Find me on LinkedIn</a>
        </p>
