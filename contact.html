    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Contact | Kevin Struna",
      "url": "https://kevinstruna.dev/contact.html",
      "mainEntity": {
        "@type": "Person",
        "name": "Kevin Struna",
        "url": "https://kevinstruna.dev/",

<body>

    <div id="site-nav"></div>

    <main>
        <div class="page-hero">
            <h1>Get in Touch</h1>
            <p class="tagline">Have a question or want to work together?</p>
        </div>
    
        <div class="content-column content-column--form">
            <form id="contact-form" action="https://formspree.io/f/xvzbegow" method="POST" class="glass-card card-content">                
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John Appleseed" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="john@icloud.com" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Tell me about your project or opportunity..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-block">
                    Send Message
                </button>
            </form>

            <div id="form-success" class="glass-card card-content text-center" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="success-icon"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h3 class="success-title">Message sent!</h3>
                <p class="text-muted m-0">Thanks for reaching out! I'll get back to you soon.</p>
            </div>

        </div>

        <p class="contact-alt">
            Prefer to connect directly? <a href="https://www.linkedin.com/in/kevin-struna/" target="_blank" rel="noopener noreferrer" class="inline-link">Find me on LinkedIn</a>
        </p>
    </main>

    <script src="js/contact.js" defer></script>

    <div id="site-footer"></div>

</body>
</html>
